services:
  api:
    build:
      context: ./server
    container_name: ce50-api
    ports:
      - "8000:8000"
    volumes:
      - ce50-data:/data
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Required — server/config.py refuses to start without a non-default JWT_SECRET.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required - see README Docker section}
      DB_PATH: /data/ce50.db
      UPLOAD_DIR: /data/uploads
    restart: unless-stopped

  web:
    build:
      context: .
      args:
        # Baked into the JS bundle at build time (NEXT_PUBLIC_*).
        # On a VPS, rebuild with the API's public URL, e.g. http://<host>:8000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ce50-web
    ports:
      - "3000:3000"
    environment:
      # ponytail: server-side fetches (SSR + route handlers) run inside this
      # container, where localhost = Next (3000), not the API. The API is on the
      # compose network as http://api:8000 — point server fetches there. Browsers
      # keep using NEXT_PUBLIC_API_URL (baked at build) to reach the public host.
      API_INTERNAL_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ce50-data:
