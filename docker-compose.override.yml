# Docker Compose override file for local development with live hot-reloading.
# Docker automatically merges this with docker-compose.yml when running `docker compose up`.

services:
  api:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./server:/app

  web:
    build:
      context: .
      target: deps
    command: npm run dev
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
